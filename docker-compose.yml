services:
  backend:
    build:
      context: ./backend
    container_name: t2d-backend
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/cache/huggingface
      - TRANSFORMERS_CACHE=/cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/cache/huggingface
    restart: unless-stopped  

  frontend:
    build:
      context: ./frontend
    container_name: t2d-frontend
    environment:
      - API_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hf_cache:
